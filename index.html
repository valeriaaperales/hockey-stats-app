<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Hockey Dashboard</title>
    <style>
        * {
            margin:0;
            padding:0;
            box-sizing: border-box;;
        }

        body {
            font-family: 'Seguo UI', sans-serif;
            background: #f8f9fa;
            color: #1b1b1b
        }

        h1 {
            text-align: center;
            padding: 20px;
            font-size: 40px;
            color: #1d3557;
            border-bottom: 4px solid #dee2e6;
            background: #ffffff;
        }

        /*Style navigation buttons*/
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 16px;
            background: #ffffff;
            border-bottom: 1px solid #dee2e6;
        }

        .nav button {
            padding: 8px 24px;
            border: 3px solid #dee2e6;
            border-radius: 20px;
            background: #ffffff;
            color: #6c757d;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .nav button:hover {
            font-size: 18px;
            background: #f8f9fa;
            color: #1d3557;
        }

        .nav button.active {
            background: #1d3557;
            color: #ffffff;
            border-color: #1d3557;
        }

        /*Style main content*/
        #Statistics, #PlayBYPlay {
            max-width: 1300px;
            margin: 24px auto;
            padding:0 24px;
        }

        #Statistics > div:first-child {
            display: flex;
            justify-content: center;
            padding: 16px 0;
            gap: 8px;
        }

        #StatTeam > div:not(#Team1View):not(#Team2View),
        #StatPlayers > div:not(#Team1PlayerView):not(#Team2PlayerView) {
            display: flex;
            justify-content: center;
            padding: 12px 0;
            gap: 8px;
        }
        
        /*Style tables*/
        table {
            border-collapse: collapse;
            border: 6px solid #c5c4c4;
        }

        th{
            background: #1d3557;
            color: #ffffff;
            padding: 12px 16px;
            border: 4px solid #c5c4c4;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
        }

        td {
            padding: 10px 16px;
            border-bottom: 4px solid #c5c4c4;
            border: 4px solid #c5c4c4;
            text-align: center;
            font-size: 14px;
        }

        tr:hover td {
            background: #d8dce0;
        }

        /*Style stat buttons (quarter filter, team, players)*/
        .stat-btn {
            padding: 6px 16px;
            border: 3px solid #dee2e6;
            border-radius: 16px;
            background: #ffffff;
            color: #6c757d;
            cursor: pointer;
            font-size: 13px;
            margin: 4px;
            transition: all 0.2s;
        }

        .stat-btn:hover {
            font-size: 18px;
            background: #f8f9fa;
            color: #1d3557;
        }

        .stat-btn.active {
            background: #1d3557;
            color: #ffffff;
            border-color: #1d3557;
        }

        /*Style scoreboard*/
        #Scoreboard {
            background: #ffffff;
            border-bottom: 1px solid #dee2e6;
            padding: 8px 0;
        }

    </style>
</head>
<body>

        // Load events
        async function loadEvents(quarterFilter = null) {
            const {data: match} = await db
                .from('matches')
                .select('id')
                .eq('status', 'live')
                .order('id', {ascending: false})
                .limit(1)
                .single();

            if (!match) return;

            const {data, error} = await db
                .from('events')
                .select('*, players(number, first_name, last_name, position)')
                .eq('match', match.id)
                .order('id', {ascending: true});

            if (error || !data || data.length === 0) {
                document.getElementById('PlayByPlay').textContent = 'No events found';
                return;
            }

            const grouped = [];
            const used = new Set();

            data.forEach((ev, i) => {
                if (used.has(i)) return;
                if (ev.result === 'goal') {
                    const assistIndex = data.findIndex((a, j) =>
                        !used.has(j) &&
                        a.event === 'assist' &&
                        a.quarter === ev.quarter &&
                        a.time === ev.time &&
                        a.team_id === ev.team_id
                    );
                    if (assistIndex !== -1) {
                        grouped.push({main: ev, assist: data[assistIndex], save: null});
                        used.add(i);
                        used.add(assistIndex);
                    } else {
                        grouped.push({main: ev, assist: null, save: null});
                    }
                } else if (ev.result === 'shot on target') {
                    const saveIndex = data.findIndex((a, j) =>
                        a.result === 'saved' &&
                        a.quarter === ev.quarter &&
                        a.time === ev.time
                    );
                    if (saveIndex !== -1) {
                        grouped.push({main: ev, assist: null, save: data[saveIndex]});
                        used.add(i);
                        used.add(saveIndex);
                    } else {
                        grouped.push({main: ev, assist: null, save: null});
                    }
                } else if (ev.event !== 'assist' && ev.result !== 'saved') {
                    grouped.push({main: ev, assist: null, save: null});
                    used.add(i);
                }

            document.getElementById('PlayByPlayContent').innerHTML = `

                            <span style="color:#6c757d; font-size:13px; min-width:80px;">${ev.quarter} ${ev.time}</span>
                            <span style="font-weight:600; color:#1d3557;">${label}</span>
                            <span style="color:#1b1b1b;">${player}${assistStr}${saveStr}</span>

        // Load past matches

        // Load team stats
        async function loadTeamView(quarterFilter = null) {
            const {data: match} = await db
                .from('matches')
                .select('*, team1:teams!matches_team1_id_fkey(name), team2:teams!matches_team2_id_fkey(name)')

                .from('events')

                .eq('match_id', match.id);

            document.getElementById('btnTeam2').textContent = match.team2.name;

            document.getElementById('Team2View').innerHTML = renderTeamTable(t2, match.team2.name);

                type: 'bar',

                    datasets: [

                        {label: match.team2.name, data: [t2.goals, t2.assists, t2.shots, t2.shotsOnTarget, t2.pcs, t2.entries, t2.saves], backgroundColor: 'rgba(255, 99, 132, 0.6)'},
                    ]
                },
                options: {responsive: true, plugins: 
                    {title: {display:true, text: 'Team Comparison'},
                    tooltip: {callbacks: {
                        afterBody: function(context) {
                            const label = context[0].label;
                            const datasetLabel = context[0].dataset.label;
                            const teamId = datasetLabel === match.team1.name ? match.team1_id : match.team2_id;
                            const statMap = {
                                'Goals': 'goals',
                                'Assists': 'assists',
                                'Shots' : 'shots',
                                'Shots on target' : 'shotsOnTarget',
                                'PC' : 'pcs',
                                'Saves' : 'saves'
                            };
                        }
                    }}
                }}

        }

        // Load individual stats
        async function loadPlayerView(quarterFilter = null) {
            const {data: match} = await db
                .from('matches')
                .select('*, team1:teams!matches_team1_id_fkey(name), team2:teams!matches_team2_id_fkey(name)')
                .eq('status', 'live')
                .order('id', {ascending: false})
                .limit(1)
                .single();

            if (!match) return;

            const {data: events} = await db
                .from('events')
                .select('*, players(id, number, first_name, last_name, position, team_id)')
                .eq('match_id', match.id);

            if (!events) return;

            const {data: players1} = await db.from('players').select('*').eq('team_id', match.team1_id);
            const {data: players2} = await db.from('players').select('*').eq('team_id', match.team2_id);

            let filteredEvents = events;
            if (quarterFilter) filteredEvents = events.filter(ev => ev.quarter === quarterFilter);

            const stats1 = buildPlayerStats(players1 || [], filteredEvents);
            const stats2 = buildPlayerStats(players2 || [], filteredEvents);

            document.getElementById('btnPlayer1').textContent = match.team1.name;
            document.getElementById('btnPlayer2').textContent = match.team2.name;
            document.getElementById('Team1PlayerView').innerHTML = renderPlayerTable(stats1, 'Team1PlayerView');
            document.getElementById('Team2PlayerView').innerHTML = renderPlayerTable(stats2, 'Team2PlayerView');
        }

        // ── Shared render functions ──────────────────────────────────
        function computeStats(events, teamId, quarterFilter = null) {
            let e = events.filter(ev => ev.team_id === teamId);
            if (quarterFilter) e = e.filter(ev => ev.quarter === quarterFilter);
            const goals = e.filter(ev => ev.result === 'goal').length;
            const shots = e.filter(ev => ev.event === 'shot' && ev.result !== 'saved').length;
            const shotsOnTarget = e.filter(ev => ev.result === 'shot on target' || ev.result === 'goal').length;
            const shotsMissed = e.filter(ev => ev.result === 'miss').length;
            const assists = e.filter(ev => ev.event === 'assist').length;
            const saves = e.filter(ev => ev.result === 'saved').length;
            const pcs = e.filter(ev => ev.event === 'pc').length;
            const pcGoals = e.filter(ev => ev.event === 'pc' && ev.result === 'goal').length;
            const corners = e.filter(ev => ev.event === 'corner').length;
            const fouls = e.filter(ev => ev.event === 'foul').length;
            const entries = e.filter(ev => ev.event === 'entry').length;
            const shotsConceded = events.filter(ev => ev.team_id !== teamId && (ev.result === 'shot on target' || ev.result === 'goal')).length;
            return {
                goals, assists, shots, shotsOnTarget, shotsMissed, saves, pcs, pcGoals, corners, fouls, entries, shotsConceded,
                shotAccuracy: shots > 0 ? Math.round((shotsOnTarget / shots) * 100) : 0,
                shotEfficiency: shots > 0 ? Math.round((goals / shots) * 100) : 0,
                pcConversion: pcs > 0 ? Math.round((pcGoals / pcs) * 100) : 0,
                savePercentage: shotsConceded > 0 ? Math.round((saves / shotsConceded) * 100) : 0,
            };
        }

        function renderTeamTable(s) {
            const valueRows = [
                {label: 'Goals', value: s.goals},
                {label: 'Shots', value: s.shots},
                {label: 'Shots on Target', value: s.shotsOnTarget},
                {label: 'Shots Missed', value: s.shotsMissed},
                {label: 'Assists', value: s.assists},
                {label: 'Saves', value: s.saves},
                {label: 'Penalty Corners', value: s.pcs},
                {label: 'Corners', value: s.corners},
                {label: 'Fouls', value: s.fouls},
                {label: 'Entries', value: s.entries},
            ];
            const ratioRows = [
                {label: 'Shot Accuracy', ratio: `${s.shotsOnTarget}/${s.shots}`, pct: `${s.shotAccuracy}%`},
                {label: 'Shot Efficiency', ratio: `${s.goals}/${s.shots}`, pct: `${s.shotEfficiency}%`},
                {label: 'PC Conversion', ratio: `${s.pcGoals}/${s.pcs}`, pct: `${s.pcConversion}%`},
                {label: 'Save %', ratio: `${s.saves}/${s.shotsConceded}`, pct: `${s.savePercentage}%`},
            ];
            return `
                <div style="display:flex; gap:40px; margin-top:40px; padding:0 20px;">
                    <div style="width:45%">
                        <table style="width:100%">
                            <thead><tr><th>Stat</th><th>Value</th></tr></thead>
                            <tbody>${valueRows.map(r => `<tr><td>${r.label}</td><td>${r.value}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                    <div style="width:45%">
                        <table style="width:100%">
                            <thead><tr><th>Stat</th><th>Ratio</th><th>%</th></tr></thead>
                            <tbody>${ratioRows.map(r => `<tr><td>${r.label}</td><td>${r.ratio}</td><td>${r.pct}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function buildPlayerStats(players, events) {
            players.forEach(p => playerRegistry[p.id] = p);
            return players.map(p => {
                const pe = events.filter(ev => ev.player_id === p.id);
                const goals = pe.filter(ev => ev.result === 'goal').length;
                const assists = pe.filter(ev => ev.event === 'assist').length;
                const shots = pe.filter(ev => (ev.event === 'shot' || ev.event === 'pc') && ev.result !== 'saved').length;
                const shotsOnTarget = pe.filter(ev => ev.result === 'shot on target' || ev.result === 'goal').length;
                const saves = pe.filter(ev => ev.result === 'saved').length;
                const shotAccuracy = shots > 0 ? Math.round((shotsOnTarget / shots) * 100) : 0;
                const shotEfficiency = shots > 0 ? Math.round((goals / shots) * 100) : 0;
                const isGK = p.position?.toLowerCase() === 'gk';
                const shotsConceded = isGK ? events.filter(ev => ev.team_id !== p.team_id && (ev.result === 'shot on target' || ev.result === 'goal')).length : 0;
                return {...p, goals, assists, shots, shotsOnTarget, saves, shotAccuracy, shotEfficiency, shotsConceded};
            });
        }

        function renderPlayerTable(playerStats, containerId) {
            return `
                <table border="1" style="width:90%; border-collapse:collapse; margin:0 auto;">
                    <thead>
                        <tr><th>#</th><th>Player</th><th>Pos</th><th>Goals</th><th>Assists</th><th>Shots</th><th>On Target</th><th>Accuracy</th><th>Efficiency</th><th>Saves</th></tr>
                    </thead>
                    <tbody>
                        ${playerStats.sort((a,b) => parseInt(a.number) - parseInt(b.number)).map(p => `
                            <tr style="cursor:pointer" onclick="showPlayerChart(${p.id}, ${p.goals}, ${p.assists}, ${p.shots}, ${p.shotsOnTarget}, ${p.saves}, ${p.shotsConceded}, '${containerId}')">
                                <td>${p.number}</td><td>${p.first_name[0]}. ${p.last_name}</td><td>${p.position || '-'}</td>
                                <td>${p.goals}</td><td>${p.assists}</td><td>${p.shots}</td>
                                <td>${p.shotsOnTarget}</td><td>${p.shotAccuracy}%</td><td>${p.shotEfficiency}%</td><td>${p.saves}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        // Initialize statistics
        function initStatistics() {
        document.getElementById('Statistics').innerHTML = `
            <div>
                <button class="stat-btn" onclick="showStatsTab('team', this)">Team</button>
                <button class="stat-btn" onclick="showStatsTab('players', this)">Players</button>
            </div>
            <div id="StatTeam">
                <div>
                    <button class="stat-btn" onclick="filterTeamQuarter('all', this)">Total</button>
                    <button class="stat-btn" onclick="filterTeamQuarter('1st', this)">1st</button>
                    <button class="stat-btn" onclick="filterTeamQuarter('2nd', this)">2nd</button>
                    <button class="stat-btn" onclick="filterTeamQuarter('3rd', this)">3rd</button>
                    <button class="stat-btn" onclick="filterTeamQuarter('4th', this)">4th</button>
                </div>
                <div>
                    <button class="stat-btn" onclick="showTeamView('team1', this)" id="btnTeam1"></button>
                    <button class="stat-btn" onclick="showTeamView('team2', this)" id="btnTeam2"></button>
                </div>
                <canvas id="teamChart" width="100" height="30"></canvas>
                <div id="Team1View" style="width:100%"></div>
                <div id="Team2View" style="display:none; width:100%"></div>
            </div>
            <div id="StatPlayers" style="display:none">
                <div>
                    <button class="stat-btn" onclick="filterPlayerQuarter('all', this)">Total</button>
                    <button class="stat-btn" onclick="filterPlayerQuarter('1st', this)">1st</button>
                    <button class="stat-btn" onclick="filterPlayerQuarter('2nd', this)">2nd</button>
                    <button class="stat-btn" onclick="filterPlayerQuarter('3rd', this)">3rd</button>
                    <button class="stat-btn" onclick="filterPlayerQuarter('4th', this)">4th</button>
                </div>
                <div>
                    <button class="stat-btn" onclick="showPlayerView('team1', this)" id="btnPlayer1"></button>
                    <button class="stat-btn" onclick="showPlayerView('team2', this)" id="btnPlayer2"></button>
                </div>
                <div id="Team1PlayerView"></div>
                <div id="Team2PlayerView" style="display:none"></div>
            </div>
        `;
        loadTeamView();
        loadPlayerView();
        // Set default active buttons
        document.querySelector('#Statistics > div:first-child .stat-btn').classList.add('active');
        document.querySelector('#StatTeam > div:first-child .stat-btn').classList.add('active');
        document.querySelector('#StatTeam > div:nth-child(2) .stat-btn').classList.add('active');

        // Show team1 by default
        document.getElementById('Team2View').style.display = 'none';
    }
        initStatistics();

        // Player chart
        function showPlayerChart(id, goals, assists, shots, shotsOnTarget, saves, shotsConceded, containerId) {
            const p = playerRegistry[id];
            if (!p) return;
            const name = `${p.first_name[0]}. ${p.last_name}`;
            const isGK = p?.position?.toLowerCase() === 'gk';
            const shotAccuracy = shots > 0 ? Math.round((shotsOnTarget / shots) * 100) : 0;
            const shotEfficiency = shots > 0 ? Math.round((goals / shots) * 100) : 0;
            const savePercentage = shotsConceded > 0 ? Math.round((saves / shotsConceded) * 100) : 0;

            const accuracyStr = !isGK
                ? `<tr><td>Shot Accuracy</td><td>${shotsOnTarget}/${shots}</td><td>${shotAccuracy}%</td></tr>` : '';
            const efficiencyStr = !isGK
                ? `<tr><td>Shot Efficiency</td><td>${goals}/${shots}</td><td>${shotEfficiency}%</td></tr>` : '';
            const saveStr = p?.position?.toLowerCase() === 'gk' 
                ? `<tr><td>Save %</td><td>${saves}/${shotsConceded}</td><td>${savePercentage}%</td></tr>` : '';

            const popup = document.createElement('div');
            popup.style.cssText = `
                position:fixed; top:0; left:0; width:100%; height:100%;
                background:rgba(0,0,0,0.5); display:flex; justify-content:center;
                align-items:center; z-index:1000;
            `;

            popup.innerHTML = `
                <div style="background:white; padding:30px; border-radius:8px; width:700px; max-width:95%;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h3 style="margin:0">${name}</h3>
                        <button onclick="this.closest('.popup').remove()" style="cursor:pointer; font-size:18px; border:none; background:none";>✕</button>
                    </div>
                    <canvas id="popupChart" width="400" height="250"></canvas>
                    <table border="1" style="width:100%"; margin-top:20px;">
                        <thead><tr><th>Stat</th><th>Ratio</th><th>%</th></tr></thead>
                        <tbody>
                            ${accuracyStr}
                            ${efficiencyStr}
                            ${saveStr}
                        </tbody>
                    </table>
                </div>
            `;

            popup.classList.add('popup');
            popup.addEventListener('click', (e) => {if (e.target === popup) popup.remove();});
            document.body.appendChild(popup);

            const ctx = document.getElementById('popupChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Goals', 'Assists', 'Shots', 'On Target', 'Saves'],
                    datasets: [{
                        label: name,
                        data: [goals, assists, shots, shotsOnTarget, saves],
                        backgroundColor: 'rgba(54, 162, 235, 0.6)'
                    }]
                },
                options: {responsive: true, plugins: {title: {display: true, text: `${name} Stats`}}}
            });
        }

        // Tabs
        function showStats(tab, btn) {
            document.getElementById('Statistics').style.display = tab === 'statistics' ? 'block' : 'none';
            document.getElementById('PlayByPlay').style.display = tab === 'play' ? 'block' : 'none';
            document.getElementById('PastMatches').style.display = tab === 'past' ? 'block' : 'none';
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (tab === 'past') loadPastMatches();
        }

        function showTeamView(team, btn) {
            document.getElementById('Team1View').style.display = team === 'team1' ? 'block' : 'none';
            document.getElementById('Team2View').style.display = team === 'team2' ? 'block' : 'none';
            btn.parentElement.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        function filterTeamQuarter(quarter, btn) {
                loadTeamView(quarter === 'all' ? null : quarter);
                btn.parentElement.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
        }

        function filterPlayerQuarter(quarter, btn) {
                loadPlayerView(quarter === 'all' ? null : quarter);
                btn.parentElement.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
        }

        function showPlayerView(team, btn) {
            document.getElementById('Team1PlayerView').style.display = team === 'team1' ? 'block' : 'none';
            document.getElementById('Team2PlayerView').style.display = team === 'team2' ? 'block' : 'none';
            btn.parentElement.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function showStatsTab(tab, btn) {
            document.getElementById('StatTeam').style.display = tab === 'team' ? 'block' : 'none';
            document.getElementById('StatPlayers').style.display = tab === 'players' ? 'block' : 'none';
            // Mark active
            btn.parentElement.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function showPastTab(tab, btn) {
            document.getElementById('PastTeamView').style.display = tab === 'team' ? 'block' : 'none';
            document.getElementById('PastPlayersView').style.display = tab === 'players' ? 'block' : 'none';
            btn.parentElement.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function showPastTeam(team, btn) {
            document.getElementById('PastTeam1View').style.display = team === 'team1' ? 'block' : 'none';
            document.getElementById('PastTeam2View').style.display = team === 'team2' ? 'block' : 'none';
            btn.parentElement.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function showPastPlayers(team, btn) {
            document.getElementById('PastPlayers1View').style.display = team === 'team1' ? 'block' : 'none';
            document.getElementById('PastPlayers2View').style.display = team === 'team2' ? 'block' : 'none';
            btn.parentElement.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function filterPlayByPlay(quarter, btn) {
            loadEvents(quarter === 'all' ? null : quarter);
            btn.parentElement.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // Realtime
        db.channel('matches')
            .on('postgres_changes', {event: '*', schema: 'public', table: 'matches'}, () => {
                loadMatches();
            })
            .subscribe();

        db.channel('events')
            .on('postgres_changes', {event: '*', schema: 'public', table: 'events'}, () => {
                setTimeout(() => {
                    requestAnimationFrame(() => {
                        loadEvents();
                        loadTeamView();
                        loadPlayerView();
                    });
                }, 2000);
            })
            .subscribe();

    </script>
</body>
</html>
